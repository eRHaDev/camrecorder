<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video Recorder</title>
  <style>
    body { font-family: sans-serif; max-width: 640px; margin: 0 auto; padding: 1rem; }
    button { padding: 1rem 2rem; font-size: 1.2rem; margin: 0.5rem 0; cursor: pointer; }
    button:disabled { opacity: 0.4; cursor: default; }
    video { width: 100%; margin: 0.5rem 0; background: #000; }
    #status { color: gray; margin: 0.5rem 0; min-height: 1.5em; }
    .controls { display: flex; gap: 0.5rem; flex-wrap: wrap; }
  </style>
</head>
<body>
  <h1>Video Recorder</h1>
  <video id="preview" autoplay playsinline muted></video>
  <div class="controls">
    <button id="startBtn">Start Recording</button>
    <button id="stopBtn" disabled>Stop Recording</button>
    <button id="flipBtn">Flip Camera</button>
  </div>
  <p id="status">Ready</p>

  <script>
    let mediaRecorder = null;
    let currentFilename = null;
    let lastUploadPromise = Promise.resolve();
    let currentStream = null;
    let facingMode = 'environment';

    const previewEl = document.getElementById('preview');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const flipBtn = document.getElementById('flipBtn');
    const statusEl = document.getElementById('status');

    async function startPreview(mode) {
      if (currentStream) {
        currentStream.getTracks().forEach(t => t.stop());
      }
      try {
        currentStream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: mode },
          audio: true,
        });
      } catch (err) {
        statusEl.textContent = 'Camera access denied or unavailable.';
        return;
      }
      previewEl.srcObject = currentStream;
      facingMode = mode;
    }

    flipBtn.addEventListener('click', () => {
      startPreview(facingMode === 'environment' ? 'user' : 'environment');
    });

    startBtn.addEventListener('click', () => {
      if (!currentStream) {
        statusEl.textContent = 'Camera not ready.';
        return;
      }
      lastUploadPromise = Promise.resolve();
      currentFilename = new Date().toISOString().replace(/:/g, '-').replace(/\..+/, '') + '.webm';
      mediaRecorder = new MediaRecorder(currentStream);

      mediaRecorder.ondataavailable = (e) => {
        if (e.data.size > 0) {
          lastUploadPromise = lastUploadPromise.then(() =>
            fetch(`/upload?filename=${currentFilename}`, {
              method: 'POST',
              body: e.data,
            })
          );
        }
      };

      mediaRecorder.start(1000);
      startBtn.disabled = true;
      stopBtn.disabled = false;
      flipBtn.disabled = true;
      statusEl.textContent = 'Recording...';
    });

    stopBtn.addEventListener('click', () => {
      const recorder = mediaRecorder;
      recorder.onstop = async () => {
        await lastUploadPromise;
        statusEl.textContent = 'Saved!';
      };
      recorder.stop();
      mediaRecorder = null;
      startBtn.disabled = false;
      stopBtn.disabled = true;
      flipBtn.disabled = false;
    });

    startPreview(facingMode);
  </script>
</body>
</html>
