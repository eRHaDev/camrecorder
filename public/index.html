<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video Recorder</title>
  <style>
    body { font-family: sans-serif; max-width: 640px; margin: 0 auto; padding: 1rem; }
    button { padding: 1rem 2rem; font-size: 1.2rem; margin: 0.5rem 0; cursor: pointer; }
    button:disabled { opacity: 0.4; cursor: default; }
    video { width: 100%; margin: 0.5rem 0; background: #000; }
    #status { color: gray; margin: 0.5rem 0; min-height: 1.5em; }
    .recording-item { border-top: 1px solid #ddd; padding-top: 0.5rem; margin-top: 0.5rem; }
    .recording-item p { margin: 0 0 0.25rem; font-size: 0.9rem; color: #555; }
  </style>
</head>
<body>
  <h1>Video Recorder</h1>
  <div>
    <button id="startBtn">Start Recording</button>
    <button id="stopBtn" disabled>Stop Recording</button>
  </div>
  <p id="status">Ready</p>

  <h2>Recordings</h2>
  <div id="videos"></div>

  <script>
    let mediaRecorder = null;
    let currentFilename = null;
    let lastUploadPromise = Promise.resolve();

    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const statusEl = document.getElementById('status');

    async function loadVideos() {
      const res = await fetch('/videos');
      const files = await res.json();
      const container = document.getElementById('videos');
      container.innerHTML = '';
      if (files.length === 0) {
        const p = document.createElement('p');
        p.textContent = 'No recordings yet.';
        container.appendChild(p);
        return;
      }
      files.forEach(f => {
        const div = document.createElement('div');
        div.className = 'recording-item';
        const p = document.createElement('p');
        p.textContent = f;
        const video = document.createElement('video');
        video.src = '/uploads/' + encodeURIComponent(f);
        video.controls = true;
        video.style.cssText = 'width:100%;margin:0.5rem 0;background:#000';
        div.append(p, video);
        container.appendChild(div);
      });
    }

    startBtn.addEventListener('click', async () => {
      lastUploadPromise = Promise.resolve();
      let stream;
      try {
        stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
      } catch (err) {
        statusEl.textContent = 'Camera access denied.';
        return;
      }

      currentFilename = new Date().toISOString().replace(/:/g, '-').replace(/\..+/, '') + '.webm';
      mediaRecorder = new MediaRecorder(stream);

      mediaRecorder.ondataavailable = (e) => {
        if (e.data.size > 0) {
          lastUploadPromise = lastUploadPromise.then(() =>
            fetch(`/upload?filename=${currentFilename}`, {
              method: 'POST',
              body: e.data,
            })
          );
        }
      };

      mediaRecorder.start(1000);
      startBtn.disabled = true;
      stopBtn.disabled = false;
      statusEl.textContent = 'Recording...';
    });

    stopBtn.addEventListener('click', () => {
      const recorder = mediaRecorder;
      recorder.onstop = async () => {
        await lastUploadPromise;
        statusEl.textContent = 'Saved!';
        loadVideos();
      };
      recorder.stop();
      recorder.stream.getTracks().forEach(t => t.stop());
      mediaRecorder = null;
      startBtn.disabled = false;
      stopBtn.disabled = true;
    });

    loadVideos();
  </script>
</body>
</html>
