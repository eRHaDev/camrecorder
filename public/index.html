<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video Recorder</title>
  <style>
    body { font-family: sans-serif; max-width: 640px; margin: 0 auto; padding: 1rem; }
    button { padding: 1rem 2rem; font-size: 1.2rem; margin: 0.5rem 0; cursor: pointer; }
    button:disabled { opacity: 0.4; cursor: default; }
    video { width: 100%; margin: 0.5rem 0; background: #000; }
    #status { color: gray; margin: 0.5rem 0; min-height: 1.5em; }
    .controls { display: flex; gap: 0.5rem; flex-wrap: wrap; }
  </style>
</head>
<body>
  <h1>Video Recorder</h1>
  <video id="preview" autoplay playsinline muted></video>
  <div class="controls">
    <button id="startBtn">Start Recording</button>
    <button id="stopBtn" disabled>Stop Recording</button>
    <button id="flipBtn">Flip Camera</button>
  </div>
  <p id="status">Ready</p>

  <script>
    let mediaRecorder = null;
    let currentFilename = null;
    let lastUploadPromise = Promise.resolve();
    let currentStream = null;
    let facingMode = 'environment';
    let uploadHadError = false;

    const previewEl = document.getElementById('preview');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const flipBtn = document.getElementById('flipBtn');
    const statusEl = document.getElementById('status');

    async function startPreview(mode) {
      const oldStream = currentStream;
      try {
        currentStream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: mode },
          audio: true,
        });
      } catch (err) {
        statusEl.textContent = 'Camera access denied or unavailable.';
        return;
      }
      if (oldStream) {
        oldStream.getTracks().forEach(t => t.stop());
      }
      previewEl.srcObject = currentStream;
      facingMode = mode;
      try {
        await previewEl.play();
      } catch (err) {
        // Autoplay may be blocked until a user gesture; ignore.
      }
    }

    flipBtn.addEventListener('click', () => {
      startPreview(facingMode === 'environment' ? 'user' : 'environment');
    });

    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState !== 'visible' || !currentStream || mediaRecorder) return;
      const track = currentStream.getVideoTracks()[0];
      if (!track || track.readyState === 'ended') {
        startPreview(facingMode);
      } else {
        previewEl.play().catch(() => {});
      }
    });

    startBtn.addEventListener('click', () => {
      if (!currentStream) {
        statusEl.textContent = 'Camera not ready.';
        return;
      }
      lastUploadPromise = Promise.resolve();
      uploadHadError = false;
      const randomSuffix = Math.random().toString(36).slice(2, 8);
      currentFilename = new Date().toISOString().replace(/[:.]/g, '-') + '-' + randomSuffix + '.webm';
      mediaRecorder = new MediaRecorder(currentStream);

      mediaRecorder.ondataavailable = (e) => {
        if (e.data.size > 0) {
          lastUploadPromise = lastUploadPromise
            .then(() => uploadChunk(e.data))
            .catch((err) => {
              console.error('Chunk upload failed', err);
              uploadHadError = true;
            });
        }
      };

      mediaRecorder.start(1000);
      startBtn.disabled = true;
      stopBtn.disabled = false;
      flipBtn.disabled = true;
      statusEl.textContent = 'Recording...';
    });

    async function uploadChunk(blob, attempt = 1) {
      try {
        const res = await fetch(`/upload?filename=${currentFilename}`, {
          method: 'POST',
          body: blob,
        });
        if (!res.ok) throw new Error('Upload failed: ' + res.status);
      } catch (err) {
        if (attempt < 3) {
          await new Promise((r) => setTimeout(r, 500));
          return uploadChunk(blob, attempt + 1);
        }
        throw err;
      }
    }

    stopBtn.addEventListener('click', () => {
      const recorder = mediaRecorder;
      recorder.onstop = async () => {
        await lastUploadPromise;
        statusEl.textContent = uploadHadError
          ? 'Saved, but some footage may be missing (upload errors occurred).'
          : 'Saved!';
      };
      recorder.stop();
      mediaRecorder = null;
      startBtn.disabled = false;
      stopBtn.disabled = true;
      flipBtn.disabled = false;
    });

    startPreview(facingMode);
  </script>
</body>
</html>
